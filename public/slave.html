<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Teleprompter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      background: #000;
      color: #fff;
      height: 100%;
      overflow: hidden;
    }

    /* Teleprompter scroll container */
    #scroll-container {
      height: 100dvh;
      overflow-y: scroll;
      scroll-behavior: auto;
      -webkit-overflow-scrolling: touch;
      /* Hide scrollbar visually */
      scrollbar-width: none;
    }
    #scroll-container::-webkit-scrollbar { display: none; }

    /* Script text */
    #script-text {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      line-height: 1.8;
      color: #ffffff;
      word-break: break-word;
      /* Top/bottom padding so first/last lines can scroll to centre */
      padding: 50vh 2rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Fade edges */
    #fade-top,
    #fade-bottom {
      position: fixed;
      left: 0;
      right: 0;
      height: 15vh;
      pointer-events: none;
      z-index: 10;
    }
    #fade-top    { top: 0;    background: linear-gradient(to bottom, #000 0%, transparent 100%); }
    #fade-bottom { bottom: 0; background: linear-gradient(to top,    #000 0%, transparent 100%); }

    /* Start overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      padding: 2rem;
    }

    /* Markdown styles for teleprompter text */
    #script-text p      { margin-bottom: 0.6em; }
    #script-text strong { color: #ffffff; font-weight: 800; }
    #script-text em     { color: #fcd34d; font-style: italic; }
    #script-text mark   { background: rgba(251,191,36,0.3); color: #fff; border-radius: 4px; padding: 0 5px; -webkit-box-decoration-break: clone; }
    #script-text code   { font-family: monospace; color: #f87171; font-size: 0.85em; }
    #script-text .tp-h1 { font-size: 1.5em; font-weight: 800; color: #fbbf24; margin: 0.6em 0 0.3em; line-height: 1.2; }
    #script-text .tp-h2 { font-size: 1.25em; font-weight: 700; color: #e4e4e7; margin: 0.5em 0 0.25em; line-height: 1.2; }
    #script-text .tp-h3 { font-size: 1.1em; font-weight: 600; color: #a1a1aa; margin: 0.4em 0 0.2em; line-height: 1.2; }

    /* Wake lock status dot */
    #wake-status {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      right: 1rem;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      opacity: 0.5;
      font-size: 0.65rem;
      color: #71717a;
      transition: opacity 0.3s;
    }
    #wake-status:hover { opacity: 1; }
    #wake-dot { width: 6px; height: 6px; border-radius: 50%; background: #52525b; }
    #wake-dot.active { background: #4ade80; }
  </style>
</head>
<body>

  <!-- Start overlay (requires tap to begin) -->
  <div id="start-overlay">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(251,191,36,0.8)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 10l4.553-2.07A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
    </svg>
    <h1 style="font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;color:#fff;">Teleprompter</h1>
    <p style="font-size:0.85rem;color:#71717a;text-align:center;max-width:280px;line-height:1.6;">
      Tap the button below to connect and keep the screen awake while prompting.
    </p>
    <button
      id="start-btn"
      style="margin-top:0.5rem;padding:1rem 2.5rem;font-size:1.1rem;font-weight:700;border-radius:999px;background:#fbbf24;color:#000;border:none;cursor:pointer;letter-spacing:0.01em;"
      ontouchstart=""
    >
      Begin Prompting
    </button>

    <!-- Fullscreen button — shown unless already in standalone/fullscreen -->
    <button
      id="fullscreen-btn"
      style="padding:0.6rem 1.4rem;font-size:0.8rem;font-weight:600;border-radius:999px;background:transparent;color:#71717a;border:1px solid #3f3f46;cursor:pointer;display:flex;align-items:center;gap:0.4rem;"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
      </svg>
      Full Screen
    </button>

    <!-- Add-to-home-screen tip (shown as fallback) -->
    <p id="fullscreen-tip" style="font-size:0.72rem;color:#52525b;text-align:center;max-width:260px;line-height:1.7;display:none;">
      📲 For true full screen on iPhone:<br>
      tap <strong style="color:#a1a1aa;">Share</strong> → <strong style="color:#a1a1aa;">Add to Home Screen</strong>,<br>then open from your home screen.
    </p>

    <p id="waiting-msg" style="font-size:0.75rem;color:#52525b;display:none;">
      Waiting for script from master…
    </p>
  </div>

  <!-- Wake lock status indicator -->
  <div id="wake-status">
    <span id="wake-dot"></span>
    <span id="wake-label">Screen lock</span>
  </div>

  <!-- Fade overlays -->
  <div id="fade-top"></div>
  <div id="fade-bottom"></div>

  <!-- Scroll container -->
  <div id="scroll-container">
    <div id="script-text">Waiting for script…</div>
  </div>

  <script src="/nosleep.js"></script>
  <script src="/md.js"></script>
  <script src="/slave.js"></script>
</body>
</html>
